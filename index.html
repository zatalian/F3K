<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F3K Draw Master</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #3498db;
            --success: #27ae60;
            --bg: #f4f7f6;
        }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--primary); margin: 0; padding: 20px; }
        .container { max-width: 960px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: var(--primary); border-bottom: 2px solid var(--accent); padding-bottom: 10px; margin-top: 0; }
        .input-section { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        textarea, input[type="number"] { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; }
        textarea { height: 120px; resize: vertical; }
        .btn { padding: 12px 24px; color: white; border: none; border-radius: 4px; font-size: 15px; cursor: pointer; transition: background 0.3s; }
        .action-bar { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; margin-bottom: 10px; }
        .btn-import { background: #95a5a6; }
        .btn-import:hover { background: #7f8c8d; }
        .btn-primary { background: var(--accent); }
        .btn-primary:hover { background: #2980b9; }
        .btn-tasks { background: #8e44ad; }
        .btn-tasks:hover { background: #7d3c98; }
        .btn-pilots { background: #e67e22; }
        .btn-pilots:hover { background: #d35400; }
        .btn-timers { background: #16a085; }
        .btn-timers:hover { background: #138d75; }
        .btn-success { background: var(--success); }
        .btn-success:hover { background: #219a52; }
        .btn-secondary { background: #7f8c8d; }
        .btn-secondary:hover { background: #6c7a7b; }
        .export-bar { display: flex; gap: 10px; margin-bottom: 20px; }
        .draw-results { margin-top: 30px; }
        .task-card { margin-bottom: 30px; border: 1px solid #ddd; border-radius: 8px; overflow: hidden; page-break-inside: avoid; }
        .task-header { background: var(--primary); color: white; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; font-size: 16px; }
        .task-header .task-name { font-weight: bold; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 10px 12px; text-align: left; }
        th { background-color: #f8f9fa; font-weight: 600; }
        tr:nth-child(even) { background-color: #fcfcfc; }
        .group-label { font-weight: bold; color: var(--accent); }
        .stats { margin-top: 30px; margin-bottom: 30px; padding: 16px; background: #f8f9fa; border-radius: 8px; border: 1px solid #eee; }
        .stats h3 { margin-top: 0; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: 14px; }
        .stat-item { display: flex; justify-content: space-between; padding: 4px 8px; background: white; border-radius: 4px; }
        .quality-bar { margin-bottom: 12px; }
        .quality-bar-label { display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 4px; }
        .quality-bar-track { height: 20px; background: #e0e0e0; border-radius: 10px; overflow: hidden; }
        .quality-bar-fill { height: 100%; border-radius: 10px; transition: width 0.4s; }
        .quality-breakdown { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px; font-size: 13px; }
        .quality-sub { text-align: center; padding: 6px; background: white; border-radius: 4px; }
        .quality-sub-label { font-size: 11px; color: #666; }

        .busy-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.7); display: flex; align-items: center;
            justify-content: center; z-index: 9999;
        }
        .busy-spinner {
            width: 48px; height: 48px; border: 5px solid #ddd;
            border-top-color: var(--accent); border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        @media print {
            @page { size: landscape; }
            .input-section, .action-bar, h1, .export-bar, .busy-overlay { display: none; }
            .stats { display: none; }
            body { background: white; padding: 0; font-size: 10px; }
            .container { box-shadow: none; max-width: 100%; padding: 4px; }
            .draw-results { columns: 3; column-gap: 8px; margin-top: 4px; }
            .task-card { border: 2px solid #333; break-inside: avoid; margin-bottom: 6px; }
            .task-header { padding: 4px 8px; font-size: 11px; }
            th, td { padding: 2px 6px; font-size: 10px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>F3K Draw Master</h1>

    <div class="input-section">
        <div>
            <label for="pilots">Pilots (one per line, optional avoid-tag: name; number):</label>
            <textarea id="pilots">Pilot A; 1
Pilot B; 1, 3
Pilot C
Pilot D
Pilot E
Pilot F
Pilot G; 3
Pilot H; 2
Pilot I; 2</textarea>
        </div>
        <div>
            <label for="tasks">Available Tasks (one per line):</label>
            <textarea id="tasks">Task A (L1 - 5 max)
Task B (L2 - 3/4 max)
Task C (All up)
Task D (2 flights - 5 max)
Task E (Poker)
Task F (Best 3 of 6)
Task G (5x2)
Task H (1,2,3,4)
Task I (Best 3 - 3:20 max)
Task J (Last 3 - 3 max)
Task K (Big Ladder)
Task L (1 flight)
Task N (Best flight)</textarea>
        </div>
        <div>
            <label for="numTasks">Number of Tasks to Draw:</label>
            <input type="number" id="numTasks" value="9" min="1">
        </div>
        <div>
            <label for="numGroups">Number of Groups:</label>
            <input type="number" id="numGroups" value="2" min="2">
        </div>
    </div>

    <input type="file" id="fileInput" accept=".csv" style="display:none" onchange="handleFileImport(event)">
    <div class="action-bar">
        <button class="btn btn-import" onclick="document.getElementById('fileInput').click()">Import Draw</button>
        <button class="btn btn-primary" onclick="generateAll()">Generate All</button>
        <button class="btn btn-tasks" onclick="generateTasks()">Reassign Tasks</button>
        <button class="btn btn-pilots" onclick="generatePilotsAndTimers()">Reassign Pilots &amp; Timers</button>
        <button class="btn btn-timers" onclick="generateTimersOnly()">Reassign Timers</button>
    </div>

    <div id="drawOutput" class="draw-results"></div>
</div>

<script>
    // ── Utility ──────────────────────────────────────────────────────────
    function shuffle(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
    }

    // ── Task Selection ───────────────────────────────────────────────────
    function selectTasks(taskList, count) {
        if (count > taskList.length) {
            throw new Error(`Cannot draw ${count} tasks from a list of ${taskList.length}.`);
        }
        return shuffle(taskList).slice(0, count);
    }

    // ── Pilot Assignment (minimize repeat encounters + balance group visits) ─
    function createEncounterMatrix(pilots) {
        const matrix = {};
        for (const p of pilots) {
            matrix[p] = {};
            for (const q of pilots) {
                matrix[p][q] = 0;
            }
        }
        return matrix;
    }

    function createGroupVisitCounts(pilots, numGroups) {
        const counts = {};
        for (const p of pilots) {
            counts[p] = new Array(numGroups).fill(0);
        }
        return counts;
    }

    function updateEncounterMatrix(matrix, groups) {
        for (const group of groups) {
            for (let i = 0; i < group.length; i++) {
                for (let j = i + 1; j < group.length; j++) {
                    matrix[group[i]][group[j]]++;
                    matrix[group[j]][group[i]]++;
                }
            }
        }
    }

    function updateGroupVisitCounts(visitCounts, groups) {
        groups.forEach((group, gIdx) => {
            for (const p of group) {
                visitCounts[p][gIdx]++;
            }
        });
    }

    function scoreAssignment(groups, encounterMatrix, visitCounts) {
        // Encounter score: sum of previous encounters for all pairs within each group
        let encounterScore = 0;
        for (const group of groups) {
            for (let i = 0; i < group.length; i++) {
                for (let j = i + 1; j < group.length; j++) {
                    encounterScore += encounterMatrix[group[i]][group[j]];
                }
            }
        }

        // Group balance penalty: penalize placing a pilot in a group they've visited more
        // Uses the difference between the proposed group's visit count and the pilot's minimum visit count
        let balancePenalty = 0;
        groups.forEach((group, gIdx) => {
            for (const pilot of group) {
                const minVisits = Math.min(...visitCounts[pilot]);
                const thisVisits = visitCounts[pilot][gIdx];
                balancePenalty += (thisVisits - minVisits);
            }
        });

        // Weight: encounters matter most, balance is a tiebreaker
        return encounterScore * 100 + balancePenalty;
    }

    function distributePilots(pilots, numGroups) {
        const shuffled = shuffle(pilots);
        const groups = Array.from({ length: numGroups }, () => []);
        shuffled.forEach((pilot, i) => {
            groups[i % numGroups].push(pilot);
        });
        return groups;
    }

    function cloneGroups(groups) {
        return groups.map(g => [...g]);
    }

    function hillClimb(groups, encounterMatrix, visitCounts) {
        // Repeatedly try swapping two pilots from different groups; keep if score improves
        let bestScore = scoreAssignment(groups, encounterMatrix, visitCounts);
        let improved = true;

        while (improved) {
            improved = false;
            for (let g1 = 0; g1 < groups.length; g1++) {
                for (let g2 = g1 + 1; g2 < groups.length; g2++) {
                    for (let i = 0; i < groups[g1].length; i++) {
                        for (let j = 0; j < groups[g2].length; j++) {
                            // Swap
                            [groups[g1][i], groups[g2][j]] = [groups[g2][j], groups[g1][i]];
                            const newScore = scoreAssignment(groups, encounterMatrix, visitCounts);
                            if (newScore < bestScore) {
                                bestScore = newScore;
                                improved = true;
                            } else {
                                // Swap back
                                [groups[g1][i], groups[g2][j]] = [groups[g2][j], groups[g1][i]];
                            }
                        }
                    }
                }
            }
        }
        return groups;
    }

    function assignPilotsToGroups(pilots, numGroups, encounterMatrix, visitCounts) {
        const attempts = Math.min(500, Math.max(200, pilots.length * 20));
        let bestGroups = null;
        let bestScore = Infinity;

        for (let t = 0; t < attempts; t++) {
            const groups = distributePilots(pilots, numGroups);
            const score = scoreAssignment(groups, encounterMatrix, visitCounts);
            if (score < bestScore) {
                bestScore = score;
                bestGroups = cloneGroups(groups);
                if (score === 0) break;
            }
        }

        // Hill-climb from the best random seed
        bestGroups = hillClimb(bestGroups, encounterMatrix, visitCounts);
        return bestGroups;
    }

    // ── Timer Assignment (backtracking with most-constrained-first) ─────
    function assignTimers(groups, round, previousPairs, tags) {
        const pilotToGroup = {};
        groups.forEach((g, gIdx) => g.forEach(p => { pilotToGroup[p] = gIdx; }));

        const allPilots = groups.flat();
        function pairKey(a, b) { return [a, b].sort().join('|'); }

        // Build adjacency: for each pilot, list valid cross-group partners
        const crossGroupPartners = {};
        for (const p of allPilots) {
            crossGroupPartners[p] = allPilots.filter(t => t !== p && pilotToGroup[t] !== pilotToGroup[p]);
        }

        // Backtracking search for maximum matching with minimum repeated pairs
        // Shuffle first for randomness, then stable-sort by constraint count
        // This randomizes among equally-constrained pilots
        const sortedPilots = shuffle(allPilots).sort((a, b) =>
            crossGroupPartners[a].length - crossGroupPartners[b].length
        );

        const maxPairs = Math.floor(allPilots.length / 2);
        let bestPairs = null;
        let bestPairCount = -1;
        let bestRepeats = Infinity;
        let bestSameTagPairs = Infinity;
        let nodes = 0;
        const nodeLimit = 100000;

        function isSameTag(a, b) {
            const tA = tags.get(a), tB = tags.get(b);
            if (!tA || !tB) return false;
            for (const t of tA) { if (tB.has(t)) return true; }
            return false;
        }

        function isBetter(pairCount, repeats, sameTagCount) {
            // Priority: maximize pairs, then minimize repeats, then minimize same-tag pairs
            if (pairCount > bestPairCount) return true;
            if (pairCount === bestPairCount && repeats < bestRepeats) return true;
            if (pairCount === bestPairCount && repeats === bestRepeats && sameTagCount < bestSameTagPairs) return true;
            return false;
        }

        function backtrack(idx, paired, pairs, repeats, sameTagCount) {
            if (nodes++ > nodeLimit) return;

            // Skip already-paired pilots
            while (idx < sortedPilots.length && paired.has(sortedPilots[idx])) idx++;

            if (idx >= sortedPilots.length) {
                if (isBetter(pairs.length, repeats, sameTagCount)) {
                    bestPairs = [...pairs];
                    bestPairCount = pairs.length;
                    bestRepeats = repeats;
                    bestSameTagPairs = sameTagCount;
                }
                return;
            }

            // Prune: even pairing all remaining pilots can't beat current best pair count,
            // or we already have max pairs and can't improve repeats
            const remaining = sortedPilots.length - idx;
            const maxAdditionalPairs = Math.floor(remaining / 2);
            if (pairs.length + maxAdditionalPairs < bestPairCount) return;
            if (pairs.length + maxAdditionalPairs === bestPairCount && repeats >= bestRepeats) return;
            if (bestPairCount === maxPairs && repeats >= bestRepeats) return;

            const pilot = sortedPilots[idx];
            const candidates = shuffle(crossGroupPartners[pilot].filter(t => !paired.has(t)));

            // Sort candidates: prefer new pairs, then different-tag partners, then most-constrained
            candidates.sort((a, b) => {
                const aRepeat = previousPairs.has(pairKey(pilot, a)) ? 1 : 0;
                const bRepeat = previousPairs.has(pairKey(pilot, b)) ? 1 : 0;
                if (aRepeat !== bRepeat) return aRepeat - bRepeat;
                const aSame = isSameTag(pilot, a) ? 1 : 0;
                const bSame = isSameTag(pilot, b) ? 1 : 0;
                if (aSame !== bSame) return aSame - bSame;
                return crossGroupPartners[a].length - crossGroupPartners[b].length;
            });

            for (const partner of candidates) {
                const key = pairKey(pilot, partner);
                const isRepeat = previousPairs.has(key) ? 1 : 0;
                const isSameTagPair = isSameTag(pilot, partner) ? 1 : 0;

                paired.add(pilot);
                paired.add(partner);
                pairs.push([pilot, partner]);

                backtrack(idx + 1, paired, pairs, repeats + isRepeat, sameTagCount + isSameTagPair);

                pairs.pop();
                paired.delete(pilot);
                paired.delete(partner);

                // Stop if we found a perfect solution
                if (bestRepeats === 0 && bestPairCount === maxPairs && bestSameTagPairs === 0) return;
                if (nodes > nodeLimit) return;
            }

            // Also try leaving this pilot unpaired (may allow better pairings for others)
            backtrack(idx + 1, paired, pairs, repeats, sameTagCount);
        }

        backtrack(0, new Set(), [], 0, 0);

        // Update previousPairs with chosen pairs
        const pairs = bestPairs || [];
        for (const [a, b] of pairs) {
            previousPairs.add(pairKey(a, b));
        }

        // Build assignments
        const assignments = [];
        const paired = new Set();
        for (const [a, b] of pairs) {
            assignments.push({ group: pilotToGroup[a], pilot: a, timer: b });
            assignments.push({ group: pilotToGroup[b], pilot: b, timer: a });
            paired.add(a);
            paired.add(b);
        }
        for (const pilot of allPilots) {
            if (!paired.has(pilot)) {
                assignments.push({ group: pilotToGroup[pilot], pilot, timer: '' });
            }
        }

        return assignments;
    }

    // ── Statistics ────────────────────────────────────────────────────────
    function computeStats(allRounds, pilots, numGroups) {
        const encounterCounts = {};
        const groupCounts = {};
        const timerCounts = {};

        for (const p of pilots) {
            groupCounts[p] = {};
            timerCounts[p] = new Set();
            for (let g = 0; g < numGroups; g++) groupCounts[p][g] = 0;
        }

        for (const round of allRounds) {
            // Count encounters
            const groups = {};
            for (const row of round) {
                if (!groups[row.group]) groups[row.group] = [];
                groups[row.group].push(row.pilot);
                groupCounts[row.pilot][row.group]++;
                timerCounts[row.pilot].add(row.timer);
            }
            for (const g of Object.values(groups)) {
                for (let i = 0; i < g.length; i++) {
                    for (let j = i + 1; j < g.length; j++) {
                        const key = [g[i], g[j]].sort().join('|');
                        encounterCounts[key] = (encounterCounts[key] || 0) + 1;
                    }
                }
            }
        }

        const encounters = Object.values(encounterCounts);
        const maxEncounters = encounters.length > 0 ? Math.max(...encounters) : 0;

        // Timer pair stats (undirected: A↔B counts once per round)
        const timerPairCounts = {};
        let totalNeededPairs = 0;
        for (const round of allRounds) {
            // Deduplicate mutual pairs within each round
            const roundPairs = new Set();
            for (const row of round) {
                if (!row.timer) continue;
                roundPairs.add([row.pilot, row.timer].sort().join('|'));
            }
            totalNeededPairs += roundPairs.size;
            for (const key of roundPairs) {
                timerPairCounts[key] = (timerPairCounts[key] || 0) + 1;
            }
        }
        const totalPossiblePairs = pilots.length * (pilots.length - 1) / 2;
        const repeatedPairs = Object.values(timerPairCounts).filter(c => c > 1).length;

        // Group distribution: how evenly are pilots spread across groups?
        let minGroupVisits = Infinity, maxGroupVisits = 0;
        for (const p of pilots) {
            const counts = Object.values(groupCounts[p]);
            minGroupVisits = Math.min(minGroupVisits, Math.min(...counts));
            maxGroupVisits = Math.max(maxGroupVisits, Math.max(...counts));
        }

        // Timer rotation
        const timerRotation = pilots.map(p => timerCounts[p].size);
        const minTimerVariety = Math.min(...timerRotation);

        // ── Quality % ──────────────────────────────────────────────────
        const numTasks = allRounds.length;
        const groupSize = Math.ceil(pilots.length / numGroups);

        // 1) Encounter score: how close is maxEncounters to the theoretical minimum?
        //    Each round, a pilot shares a group with (groupSize-1) others.
        //    Over numTasks rounds that's numTasks*(groupSize-1) "slots" spread over (n-1) other pilots.
        //    Best possible max = ceil(numTasks * (groupSize-1) / (pilots.length - 1))
        const idealMaxEncounters = pilots.length > 1
            ? Math.ceil(numTasks * (groupSize - 1) / (pilots.length - 1))
            : 1;
        const encounterScore = maxEncounters > 0
            ? Math.min(1, idealMaxEncounters / maxEncounters)
            : 1;

        // 2) Group balance score: ideal spread is 0 or 1 (floor/ceil of rounds/groups)
        const idealSpread = numTasks % numGroups === 0 ? 0 : 1;
        const actualSpread = maxGroupVisits - minGroupVisits;
        const groupScore = actualSpread <= idealSpread
            ? 1
            : Math.max(0, 1 - (actualSpread - idealSpread) / numTasks);

        // 3) Timer repeat score: fraction of needed pairs that are unique
        const timerScore = totalNeededPairs > 0
            ? 1 - repeatedPairs / totalNeededPairs
            : 1;

        // Weighted average (encounters 40%, group balance 30%, timers 30%)
        const qualityPct = Math.round((encounterScore * 0.4 + groupScore * 0.3 + timerScore * 0.3) * 100);

        // Same-tag timer pairs (only relevant when tags are used)
        let sameTagTimerPairs = 0;
        if (pilotTags.size > 0) {
            for (const round of allRounds) {
                const roundPairs = new Set();
                for (const row of round) {
                    if (!row.timer) continue;
                    const key = [row.pilot, row.timer].sort().join('|');
                    if (roundPairs.has(key)) continue;
                    roundPairs.add(key);
                    const pTags = pilotTags.get(row.pilot);
                    const tTags = pilotTags.get(row.timer);
                    if (pTags && tTags) {
                        for (const t of pTags) { if (tTags.has(t)) { sameTagTimerPairs++; break; } }
                    }
                }
            }
        }

        return { maxEncounters, totalPossiblePairs, totalNeededPairs, repeatedPairs, minGroupVisits, maxGroupVisits, minTimerVariety, qualityPct, encounterScore, groupScore, timerScore, sameTagTimerPairs };
    }

    // ── CSV Export ────────────────────────────────────────────────────────
    function downloadCSV(allRounds, selectedTasks) {
        const rows = [['Round', 'Task', 'Group', 'Pilot', 'Timer']];
        allRounds.forEach((round, rIdx) => {
            for (const row of round) {
                rows.push([rIdx + 1, selectedTasks[rIdx], row.group + 1, row.pilot, row.timer]);
            }
        });
        const csv = rows.map(r => r.map(c => `"${c}"`).join(',')).join('\n');
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'f3k_draw.csv';
        a.click();
        URL.revokeObjectURL(url);
    }

    // ── Import (GliderScore CSV) ─────────────────────────────────────────
    function handleFileImport(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            try {
                parseGliderScoreCSV(e.target.result);
            } catch (err) {
                alert('Import failed: ' + err.message);
            }
            // Reset file input so the same file can be re-imported
            event.target.value = '';
        };
        reader.readAsText(file);
    }

    async function parseGliderScoreCSV(text) {
        const lines = text.split(/\r?\n/);

        // Parse data rows: Round;Group;Re-Flight;F3KTask;Name;Freq;Country;Org Rnd
        const rows = [];
        for (const line of lines) {
            const cols = line.split(';');
            const roundNum = parseInt(cols[0]);
            const groupNum = parseInt(cols[1]);
            if (isNaN(roundNum) || isNaN(groupNum)) continue;
            const task = (cols[3] || '').trim();
            const name = (cols[4] || '').trim();
            if (!task || !name) continue;
            rows.push({ round: roundNum, group: groupNum, task, name });
        }

        if (rows.length === 0) {
            throw new Error('No valid data rows found. Expected GliderScore CSV format (semicolon-delimited).');
        }

        // Extract unique rounds (in order), tasks, pilots, and number of groups
        const roundNumbers = [...new Set(rows.map(r => r.round))].sort((a, b) => a - b);
        const selectedTasks = roundNumbers.map(rn => rows.find(r => r.round === rn).task);
        const pilots = [...new Set(rows.map(r => r.name))];
        const numGroups = Math.max(...rows.map(r => r.group));

        // Build groupsPerRound
        const groupsPerRound = [];
        for (const rn of roundNumbers) {
            const roundRows = rows.filter(r => r.round === rn);
            const groups = Array.from({ length: numGroups }, () => []);
            for (const row of roundRows) {
                groups[row.group - 1].push(row.name);
            }
            groupsPerRound.push(groups);
        }

        // Assign timers
        showBusy();
        const allRounds = await buildRoundsFromGroups(groupsPerRound);
        hideBusy();

        // Update UI inputs
        document.getElementById('pilots').value = pilots.join('\n');
        const taskSet = [...new Set(selectedTasks)];
        document.getElementById('tasks').value = taskSet.join('\n');
        document.getElementById('numTasks').value = roundNumbers.length;
        document.getElementById('numGroups').value = numGroups;

        // Override previous draw
        lastDrawData = { allRounds, selectedTasks, groupsPerRound };
        renderCurrentDraw();
    }

    // ── Busy indicator ────────────────────────────────────────────────────
    function showBusy() {
        if (document.getElementById('busyOverlay')) return;
        const el = document.createElement('div');
        el.id = 'busyOverlay';
        el.className = 'busy-overlay';
        el.innerHTML = '<div class="busy-spinner"></div>';
        document.body.appendChild(el);
    }
    function hideBusy() {
        const el = document.getElementById('busyOverlay');
        if (el) el.remove();
    }

    // ── State ────────────────────────────────────────────────────────────
    let lastDrawData = null;   // { allRounds, selectedTasks, groupsPerRound }
    let pilotTags = new Map();  // pilot name → Set of tag numbers (pilots sharing any tag should avoid being timer partners)
    // groupsPerRound[r] = array of groups (each group is an array of pilot names)

    // ── Input helpers ─────────────────────────────────────────────────────
    function readInputs() {
        const rawLines = document.getElementById('pilots').value.split('\n').map(s => s.trim()).filter(Boolean);
        pilotTags = new Map();
        const pilots = rawLines.map(line => {
            const idx = line.lastIndexOf(';');
            if (idx !== -1) {
                const name = line.substring(0, idx).trim();
                const tagStrs = line.substring(idx + 1).split(',').map(s => s.trim());
                const tags = tagStrs.map(s => parseInt(s, 10)).filter(n => !isNaN(n));
                if (name && tags.length > 0) {
                    pilotTags.set(name, new Set(tags));
                    return name;
                }
            }
            return line;
        });
        const taskList = document.getElementById('tasks').value.split('\n').map(s => s.trim()).filter(Boolean);
        const numTasks = parseInt(document.getElementById('numTasks').value);
        const numGroups = parseInt(document.getElementById('numGroups').value);
        return { pilots, taskList, numTasks, numGroups };
    }

    function validate({ pilots, taskList, numTasks, numGroups }) {
        if (pilots.length < numGroups * 2) {
            alert(`Need at least ${numGroups * 2} pilots for ${numGroups} groups.`);
            return false;
        }
        if (numTasks > taskList.length) {
            alert(`Cannot draw ${numTasks} tasks from ${taskList.length} available tasks.`);
            return false;
        }
        if (numTasks < 1 || numGroups < 2) {
            alert('Need at least 1 task and 2 groups.');
            return false;
        }
        return true;
    }

    function countSameTagPairs(allRounds) {
        if (pilotTags.size === 0) return 0;
        let count = 0;
        for (const round of allRounds) {
            const seen = new Set();
            for (const row of round) {
                if (!row.timer) continue;
                const key = [row.pilot, row.timer].sort().join('|');
                if (seen.has(key)) continue;
                seen.add(key);
                const pTags = pilotTags.get(row.pilot);
                const tTags = pilotTags.get(row.timer);
                if (pTags && tTags) {
                    for (const t of pTags) { if (tTags.has(t)) { count++; break; } }
                }
            }
        }
        return count;
    }

    async function buildRoundsFromGroups(groupsPerRound) {
        const attempts = pilotTags.size > 0 ? 10000 : 1;
        let bestRounds = null;
        let bestSameTag = Infinity;
        for (let a = 0; a < attempts; a++) {
            // Yield to the browser every 200 iterations so the spinner can render
            if (a % 200 === 0) await new Promise(r => setTimeout(r, 0));
            const previousPairs = new Set();
            const allRounds = [];
            for (let r = 0; r < groupsPerRound.length; r++) {
                allRounds.push(assignTimers(groupsPerRound[r], r, previousPairs, pilotTags));
            }
            if (pilotTags.size === 0) return allRounds;
            const sameTag = countSameTagPairs(allRounds);
            if (sameTag < bestSameTag) {
                bestSameTag = sameTag;
                bestRounds = allRounds;
                if (sameTag === 0) break;
            }
        }
        return bestRounds;
    }

    function renderCurrentDraw() {
        if (!lastDrawData) return;
        const { allRounds, selectedTasks } = lastDrawData;
        const inputs = readInputs();
        const stats = computeStats(allRounds, inputs.pilots, inputs.numGroups);
        renderOutput(allRounds, selectedTasks, stats, inputs.numGroups);
    }

    // ── Button handlers ───────────────────────────────────────────────────
    async function generateAll() {
        const inputs = readInputs();
        if (!validate(inputs)) return;
        const { pilots, taskList, numTasks, numGroups } = inputs;

        showBusy();
        const selectedTasks = selectTasks(taskList, numTasks);
        const encounterMatrix = createEncounterMatrix(pilots);
        const visitCounts = createGroupVisitCounts(pilots, numGroups);
        const groupsPerRound = [];

        for (let r = 0; r < numTasks; r++) {
            const groups = assignPilotsToGroups(pilots, numGroups, encounterMatrix, visitCounts);
            updateEncounterMatrix(encounterMatrix, groups);
            updateGroupVisitCounts(visitCounts, groups);
            groupsPerRound.push(groups);
        }

        const allRounds = await buildRoundsFromGroups(groupsPerRound);
        lastDrawData = { allRounds, selectedTasks, groupsPerRound };
        renderCurrentDraw();
        hideBusy();
    }

    async function generateTasks() {
        const inputs = readInputs();
        if (!validate(inputs)) return;
        const { pilots, taskList, numTasks, numGroups } = inputs;

        showBusy();
        const selectedTasks = selectTasks(taskList, numTasks);

        if (lastDrawData && lastDrawData.groupsPerRound && lastDrawData.groupsPerRound.length === numTasks) {
            // Keep existing pilot/timer assignments, just swap in new tasks
            lastDrawData.selectedTasks = selectedTasks;
        } else {
            // No existing groups or round count changed – generate pilots & timers too
            const encounterMatrix = createEncounterMatrix(pilots);
            const visitCounts = createGroupVisitCounts(pilots, numGroups);
            const groupsPerRound = [];
            for (let r = 0; r < numTasks; r++) {
                const groups = assignPilotsToGroups(pilots, numGroups, encounterMatrix, visitCounts);
                updateEncounterMatrix(encounterMatrix, groups);
                updateGroupVisitCounts(visitCounts, groups);
                groupsPerRound.push(groups);
            }
            const allRounds = await buildRoundsFromGroups(groupsPerRound);
            lastDrawData = { allRounds, selectedTasks, groupsPerRound };
        }
        renderCurrentDraw();
        hideBusy();
    }

    async function generatePilotsAndTimers() {
        const inputs = readInputs();
        if (!validate(inputs)) return;
        const { pilots, numTasks, numGroups } = inputs;

        if (!lastDrawData || !lastDrawData.selectedTasks || lastDrawData.selectedTasks.length !== numTasks) {
            alert('Generate or adjust tasks first (use "Generate All" or "Generate Tasks").');
            return;
        }

        showBusy();
        const encounterMatrix = createEncounterMatrix(pilots);
        const visitCounts = createGroupVisitCounts(pilots, numGroups);
        const groupsPerRound = [];
        for (let r = 0; r < numTasks; r++) {
            const groups = assignPilotsToGroups(pilots, numGroups, encounterMatrix, visitCounts);
            updateEncounterMatrix(encounterMatrix, groups);
            updateGroupVisitCounts(visitCounts, groups);
            groupsPerRound.push(groups);
        }

        const allRounds = await buildRoundsFromGroups(groupsPerRound);
        lastDrawData = { ...lastDrawData, allRounds, groupsPerRound };
        renderCurrentDraw();
        hideBusy();
    }

    async function generateTimersOnly() {
        const inputs = readInputs();
        if (!lastDrawData || !lastDrawData.groupsPerRound || !lastDrawData.allRounds) {
            alert('Generate pilots first (use "Generate All" or "Generate Pilots & Timers").');
            return;
        }

        showBusy();
        const newRounds = await buildRoundsFromGroups(lastDrawData.groupsPerRound);

        // Keep existing pilot order, only update the timer column
        const allRounds = lastDrawData.allRounds.map((oldRound, rIdx) => {
            const timerLookup = {};
            for (const row of newRounds[rIdx]) {
                timerLookup[row.pilot] = row.timer;
            }
            return oldRound.map(row => ({ ...row, timer: timerLookup[row.pilot] || '' }));
        });

        lastDrawData = { ...lastDrawData, allRounds };
        renderCurrentDraw();
        hideBusy();
    }

    function renderOutput(allRounds, selectedTasks, stats, numGroups) {
        let html = `
            <div class="export-bar">
                <button class="btn btn-success" onclick="window.print()">Print / Save PDF</button>
                <button class="btn btn-secondary" onclick="downloadCSV(lastDrawData.allRounds, lastDrawData.selectedTasks)">Download CSV</button>
            </div>`;

        // Stats section (shown before rounds so it's visible without scrolling)
        html += `
        <div class="stats">
            <h3>Draw Statistics</h3>
            <div class="stats-grid">
                <div class="stat-item"><span>Pairs (possible / needed / repeated)</span><span>${stats.totalPossiblePairs} / ${stats.totalNeededPairs} / ${stats.repeatedPairs}</span></div>
                <div class="stat-item"><span>Max times same opponents</span><span>${stats.maxEncounters}</span></div>
                <div class="stat-item"><span>Group visits (min–max)</span><span>${stats.minGroupVisits}–${stats.maxGroupVisits}</span></div>
                <div class="stat-item"><span>Min unique timers per pilot</span><span>${stats.minTimerVariety}</span></div>
                ${pilotTags.size > 0 ? `<div class="stat-item"><span>Same-tag timer pairings</span><span>${stats.sameTagTimerPairs}</span></div>` : ''}
            </div>
        </div>`;

        allRounds.forEach((round, rIdx) => {
            html += `
            <div class="task-card">
                <div class="task-header">
                    <span>Round ${rIdx + 1}</span>
                    <span class="task-name">${selectedTasks[rIdx]}</span>
                </div>
                <table>`;

            // Sort by group for display
            const sorted = [...round].sort((a, b) => a.group - b.group);

            if (numGroups === 2) {
                // Two-group layout: show Group 1 and Group 2 side by side
                html += `<thead><tr><th>Group 1</th><th>Group 2</th></tr></thead><tbody>`;
                const g0 = sorted.filter(r => r.group === 0);
                const g1timered = new Set(g0.map(r => r.timer).filter(Boolean));
                const g1unpaired = sorted.filter(r => r.group === 1 && !g1timered.has(r.pilot));
                for (const row of g0) {
                    html += `<tr><td><strong>${row.pilot}</strong></td><td>${row.timer}</td></tr>`;
                }
                for (const row of g1unpaired) {
                    html += `<tr><td></td><td>${row.pilot}</td></tr>`;
                }
            } else {
                // Multi-group layout: Group | Pilot | Timer
                html += `<thead><tr><th>Group</th><th>Pilot</th><th>Timer</th></tr></thead><tbody>`;
                let prevGroup = -1;
                for (const row of sorted) {
                    const groupLabel = row.group !== prevGroup ? `<span class="group-label">Group ${row.group + 1}</span>` : '';
                    prevGroup = row.group;
                    html += `<tr><td>${groupLabel}</td><td><strong>${row.pilot}</strong></td><td>${row.timer}</td></tr>`;
                }
            }

            html += `</tbody></table></div>`;
        });

        document.getElementById('drawOutput').innerHTML = html;
    }
</script>
